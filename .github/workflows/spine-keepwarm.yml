# Keeps the free Render spine warm so a judge's first arrival call gets real
# numbers instead of a cold-start fallback to the mock twin. Optional: the demo
# is correct either way (a cold spine just shows "demo estimate"). Set the repo
# secret SPINE_HEALTH_URL to the spine's /health URL to switch this on; without
# it the job no-ops. GitHub may delay or skip scheduled runs under load, so this
# is best effort, not a guarantee.
name: spine keep-warm

on:
  schedule:
    - cron: "*/10 * * * *" # Render free spins down after ~15 min idle
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping spine /health
        run: |
          url="${{ secrets.SPINE_HEALTH_URL }}"
          if [ -z "$url" ]; then
            echo "SPINE_HEALTH_URL not set; nothing to keep warm."
            exit 0
          fi
          curl -fsS --max-time 30 "$url" && echo " — spine is awake" || echo "ping failed (spine may be waking)"
