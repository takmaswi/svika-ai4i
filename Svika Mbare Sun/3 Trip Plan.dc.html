<x-dc>

<helmet>

    @import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");
    body{margin:0;background:#ECEDE8;font-family:'IBM Plex Sans',ui-sans-serif,sans-serif;padding:28px;display:flex;gap:28px;flex-wrap:wrap;align-items:flex-start;justify-content:center}
    a{color:#1F4D2E}a:hover{color:#143D22}
    .dv-card{flex:none;border-radius:28px;box-shadow:0 2px 12px rgba(30,30,20,.16);overflow:hidden;border:1px solid rgba(0,0,0,.1)}
    @keyframes svk-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}}
    @keyframes svk-ripple{0%{transform:scale(.5);opacity:.5}100%{transform:scale(2.8);opacity:0}}
    @keyframes svk-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
    @keyframes svk-rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes svk-draw{to{stroke-dashoffset:0}}
    @keyframes svk-fadein{from{opacity:0}to{opacity:1}}
    @keyframes svk-beam{0%,100%{opacity:.6}50%{opacity:1}}
  </style>
</helmet>
