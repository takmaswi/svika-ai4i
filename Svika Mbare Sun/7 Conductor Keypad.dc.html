<x-dc>
<!-- Conductor (hwindi) keypad, day + night. Sunlight-first: giant type, 64px+ keys, one action. Route prefix is fixed, hwindi keys the rider's digits, confirm is the single CTA. -->
<helmet>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");
    body{margin:0;background:#ECEDE8;font-family:'IBM Plex Sans',ui-sans-serif,sans-serif;padding:28px;display:flex;gap:28px;flex-wrap:wrap;align-items:flex-start;justify-content:center}
    a{color:#1F4D2E}a:hover{color:#143D22}
    .dv-card{flex:none;border-radius:28px;box-shadow:0 2px 12px rgba(30,30,20,.16);overflow:hidden;border:1px solid rgba(0,0,0,.1)}
    @keyframes svk-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}}
    @keyframes svk-ripple{0%{transform:scale(.5);opacity:.5}100%{transform:scale(2.8);opacity:0}}
  </style>
</helmet>

        </span>

        <span style="display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:999px;background:#FFFFFF;border:1.5px solid #161D18">
          <span style="position:relative;display:inline-flex;width:7px;height:7px"><span style="position:absolute;inset:0;border-radius:999px;background:#E84C30;animation:svk-ripple 1.8s ease-out infinite"></span><span style="position:relative;width:7px;height:7px;border-radius:999px;background:#E84C30;animation:svk-pulse 1.6s ease-in-out infinite"></span></span>

        <button type="button" style="min-height:72px;border-radius:18px;border:1.5px solid #161D18;background:#FFFFFF;font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;color:#161D18;cursor:pointer" style-active="transform:scale(0.99);background:#F4F5F1">5</button>

      </div>
      <button type="button" style="margin-top:auto;width:100%;min-height:64px;border:none;border-radius:999px;background:#1F4D2E;cursor:pointer;box-shadow:0 10px 26px rgba(31,77,46,.30);font-family:'IBM Plex Sans',sans-serif;font-size:18px;font-weight:700;color:#FFFFFF" style-hover="background:#143D22" style-active="transform:scale(0.99)">Confirm boarding</button>
      <p style="font-size:12px;color:#575F53;text-align:center;margin:10px 0 0">The rider shows this code on their ticket</p>
    </div>
  </div>
