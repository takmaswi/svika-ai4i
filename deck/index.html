<script type="module">
  import { initKombi } from "./js/kombi3d.js";
  const params = new URLSearchParams(location.search);
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches || params.has("reduced");
  initKombi({ forceFallback: params.has("nowebgl"), reduced })
    .then((api) => window.SVK_BOOT(api))
    .catch(() => window.SVK_BOOT(null));
</script>
