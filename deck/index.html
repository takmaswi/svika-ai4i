<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Svika, the future of the kombi</title>
<link rel="preload" href="fonts/dm-sans-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/ibm-plex-mono-latin-600-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/ibm-plex-sans-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="css/deck.css">
<script type="importmap">{ "imports": { "three": "./vendor/three.module.min.js" } }</script>
</head>
<body class="theme-night">

<div id="kombi-layer" aria-hidden="true">
  <img id="kombi-fallback" alt="" src="">
</div>

<main id="deck">

  <!-- 1 · Cold open: char night, beam sweep, the kombi rotates in, the wordmark lands. No words yet. -->
  <section class="scene" id="s1-cold-open" data-theme="night" data-auto-hold="4200">
    <svg class="beam" id="s1-beam" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <g id="s1-beam-group" opacity="0">
        <path d="M130 -50 L680 -280 L680 280 L130 50 Z" fill="#F5B301" opacity="0.12"></path>
        <path d="M130 -40 L480 -160 L480 160 L130 40 Z" fill="#F5B301" opacity="0.15"></path>
      </g>
    </svg>
    <div class="scene-center">
      <div id="s1-wordmark" class="wordmark-pill" style="opacity:0">
        <span class="wordmark-lockup">
          <svg height="44" viewBox="13 5 76 92" aria-label="Svika"><path d="M76 26C76 18 68 14 56 14C38 14 28 22 28 32C28 44 42 48 56 50C70 52 76 58 76 68C76 80 64 86 50 86C36 86 26 80 24 70" fill="none" stroke="#1F4D2E" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="76" cy="26" r="7.5" fill="#E84C30"></circle><circle cx="24" cy="70" r="7.5" fill="#E84C30"></circle></svg>
          <span style="font-size:36px;margin-top:2px">vika</span>
        </span>
      </div>
    </div>
  </section>


</main>

<button id="btn-full" type="button" aria-label="Toggle fullscreen">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9V5.5A1.5 1.5 0 0 1 5.5 4H9"></path><path d="M15 4h3.5A1.5 1.5 0 0 1 20 5.5V9"></path><path d="M20 15v3.5a1.5 1.5 0 0 1-1.5 1.5H15"></path><path d="M9 20H5.5A1.5 1.5 0 0 1 4 18.5V15"></path></svg>
</button>
<nav id="rail" aria-label="Scenes"></nav>
<p id="hud-counter" aria-hidden="true"></p>
<p id="hud-hint">space advances · f fullscreen</p>

<script src="vendor/gsap.min.js"></script>
<script src="vendor/ScrollTrigger.min.js"></script>
<script src="vendor/SplitText.min.js"></script>
<script src="vendor/Flip.min.js"></script>
<script src="vendor/MotionPathPlugin.min.js"></script>
<script src="js/scenes.js"></script>
<script src="js/engine.js"></script>
<script type="module">
  import { initKombi } from "./js/kombi3d.js";
  const params = new URLSearchParams(location.search);
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches || params.has("reduced");
  initKombi({ forceFallback: params.has("nowebgl"), reduced })
    .then((api) => window.SVK_BOOT(api))
    .catch(() => window.SVK_BOOT(null));
</script>
</body>
</html>
